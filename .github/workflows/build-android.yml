name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-android.yml"
      - "app.json"
      - "app/**"
      - "components/**"
      - "utils/**"
      - "package.json"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://padezipdfcicydyncmkw.supabase.co
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhZGV6aXBkZmNpY3lkeW5jbWt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MDM3MzIsImV4cCI6MjA4Njk3OTczMn0.B8PpSm4sa9JYeDMqSL1u93-MyQUTwfDX4j3w6mOFCvw
      EXPO_PUBLIC_BACKEND_URL: https://staff.erdatayee.tech/api
      EXPO_PUBLIC_BACKEND_FALLBACKS: https://staff.erdatayee.tech/api,https://erdatayee.tech/api
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install --clean

      - name: Disable ProGuard to prevent release crashes
        run: |
          sed -i 's/enableProguardInReleaseBuilds = true/enableProguardInReleaseBuilds = false/g' android/app/build.gradle || true
          sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/g' android/app/build.gradle || true

      - name: Verify JS bundle and Hermes
        run: |
          echo "--- Checking build.gradle for Hermes ---"
          grep -i 'hermes' android/app/build.gradle || echo "No hermes config found"
          echo "--- Checking gradle.properties ---"
          cat android/gradle.properties | grep -i 'newArch\|hermes\|react' || true

      - name: Prepare release keystore from secrets
        run: |
          : "${ANDROID_KEYSTORE_BASE64:?Missing secret ANDROID_KEYSTORE_BASE64}"
          : "${ANDROID_KEYSTORE_PASSWORD:?Missing secret ANDROID_KEYSTORE_PASSWORD}"
          : "${ANDROID_KEY_PASSWORD:?Missing secret ANDROID_KEY_PASSWORD}"
          : "${ANDROID_KEY_ALIAS:?Missing secret ANDROID_KEY_ALIAS}"

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/erdataye-release.keystore

      - name: Build release APK
        working-directory: android
        env:
          NODE_ENV: production
        run: |
          ./gradlew --no-daemon assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/erdataye-release.keystore \
            -Pandroid.injected.signing.store.password=$ANDROID_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$ANDROID_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$ANDROID_KEY_PASSWORD

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: erdataye-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Rename release APK for clarity
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/erdataye-release.apk || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.2-build${{ github.run_number }}
          name: "Erdataye v1.0.2 (Build #${{ github.run_number }})"
          files: |
            android/app/build/outputs/apk/release/erdataye-release.apk
          generate_release_notes: true
