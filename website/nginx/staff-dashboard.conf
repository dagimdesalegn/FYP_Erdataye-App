server {
    listen 80;
    listen [::]:80;
    server_name staff.erdatayee.tech admin.erdatayee.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staff.erdatayee.tech admin.erdatayee.tech;

    ssl_certificate /etc/letsencrypt/live/erdatayee.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erdatayee.tech/privkey.pem;

    root /var/www/erdataya/staff;
    index index.html;

    # Route staff/admin domains to the correct web app login pages.
    location = / {
        if ($host = admin.erdatayee.tech) {
            return 302 https://admin.erdatayee.tech/admin;
        }
        return 302 https://staff.erdatayee.tech/staff;
    }
    location = /index.html {
        if ($host = admin.erdatayee.tech) {
            return 302 https://admin.erdatayee.tech/admin;
        }
        return 302 https://staff.erdatayee.tech/staff;
    }

    # Baseline browser hardening. Add strict CSP rules in app-specific configs if needed.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "upgrade-insecure-requests; block-all-mixed-content" always;

    # Expo static export uses *.html per route; map /hospital -> hospital.html etc.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Keep API available from staff dashboard domain too.
    location /api/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
