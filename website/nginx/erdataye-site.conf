server {
    listen 80;
    listen [::]:80;
    server_name erdataye.com www.erdataye.com;

    root /var/www/erdataya/site;
    index index.html;

    # Landing page and static assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # APK download links
    location = /erdataye.apk {
        alias /var/www/erdataya/erdataye.apk;
        add_header Content-Type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment; filename=erdataye.apk";
    }

    location = /downloads/erdataye.apk {
        alias /var/www/erdataya/downloads/erdataye.apk;
        add_header Content-Type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment; filename=erdataye.apk";
    }

    # Backend API proxy (keeps existing mobile clients working)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
